services:
  redis:
    image: redis:7-alpine
    container_name: redis
    command: redis-server --requirepass ${REDIS_PASSWORD:-abcd1234} --maxmemory 1gb --maxmemory-policy noeviction --appendonly yes
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis_data:/data
    restart: always
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-abcd1234}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: api
    env_file:
      - apps/api/.env
    volumes:
      - ./gcp_service_acc.json:/app/vertex-sa.json:ro
    ports:
      - "127.0.0.1:8000:8000"
    depends_on:
      redis:
        condition: service_healthy
    restart: always

  worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
    container_name: worker
    env_file:
      - packages/workers/.env
    volumes:
      - ./gcp_service_acc.json:/app/vertex-sa.json:ro
    depends_on:
      redis:
        condition: service_healthy
    restart: always

  web:
    build:
      context: .
      dockerfile: Dockerfile.web
    container_name: web
    env_file:
      - apps/web/.env
    ports:
      - "127.0.0.1:3000:3000"
    depends_on:
      - api
    restart: always

  caddy:
    image: caddy:2-alpine
    container_name: caddy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - web
      - api
    restart: always

volumes:
  redis_data:
  caddy_data:
  caddy_config:
